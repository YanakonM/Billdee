<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="total" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Soft drop shadow under the receipt -->
  <rect x="300" y="248" width="424" height="540" rx="44" fill="#1e1b3a" opacity="0.18"/>

  <!-- Receipt / bill -->
  <rect x="300" y="232" width="424" height="540" rx="44" fill="#ffffff"/>

  <!-- Header bar -->
  <rect x="350" y="300" width="248" height="48" rx="14" fill="#6366f1"/>

  <!-- Line items -->
  <rect x="350" y="396" width="324" height="24" rx="12" fill="#cbd5e1"/>
  <rect x="350" y="444" width="324" height="24" rx="12" fill="#cbd5e1"/>
  <rect x="350" y="492" width="208" height="24" rx="12" fill="#cbd5e1"/>

  <!-- Total bar -->
  <rect x="350" y="566" width="324" height="52" rx="16" fill="url(#total)"/>

  <!-- "Paid / good" check badge -->
  <circle cx="690" cy="724" r="74" fill="#9333ea" stroke="#ffffff" stroke-width="14"/>
  <path d="M658 724 l22 22 l42 -46" fill="none" stroke="#ffffff" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
